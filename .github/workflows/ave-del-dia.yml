name: Ave del Día

on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC = 09:00 CEST (Madrid)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Generate bird of the day
        env:
          EBIRD_API_KEY: ${{ secrets.EBIRD_API_KEY }}
        run: uv run python scripts/generate.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml history.json index.html archive.html cache/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "🐦 Ave del día: $(date -u +%Y-%m-%d)"
          git push
