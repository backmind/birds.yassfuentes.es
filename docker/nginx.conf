# Bird of the Day — minimal non-root nginx serving the static site on 8080.
# Logs to stdout/stderr so `docker logs` works.

worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 256;
}

http {
    access_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    server_tokens off;
    charset utf-8;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # nginx insists on writable temp dirs even when we don't proxy/upload.
    # Point them at /tmp so a --read-only root filesystem still works
    # (operators add a tmpfs mount for /tmp in that case).
    client_body_temp_path  /tmp/nginx-client-body;
    proxy_temp_path        /tmp/nginx-proxy;
    fastcgi_temp_path      /tmp/nginx-fastcgi;
    uwsgi_temp_path        /tmp/nginx-uwsgi;
    scgi_temp_path         /tmp/nginx-scgi;

    # Cache headers — modest TTLs because the content rotates daily.
    map $request_uri $cache_control {
        default                   "public, max-age=300";
        ~*/feed\.xml$             "public, max-age=600";
        ~*/(index|archive)\.html$ "public, max-age=300";
    }

    server {
        listen 8080 default_server;
        listen [::]:8080 default_server;
        server_name _;
        root /var/lib/botd;
        index index.html;

        # Liveness endpoint — used by docker HEALTHCHECK and any external
        # uptime monitor that wants a cheap "is nginx up" probe.
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Explicit allow-list — no directory listings, no leaking the
        # cache/ subtree, no surprises.
        location = / {
            try_files /index.html =503;
            add_header Cache-Control $cache_control always;
        }

        location = /index.html {
            add_header Cache-Control $cache_control always;
        }

        location = /archive.html {
            add_header Cache-Control $cache_control always;
        }

        location = /feed.xml {
            add_header Cache-Control $cache_control always;
            types { } default_type application/rss+xml;
        }

        location / {
            return 404;
        }
    }
}
